<!DOCTYPE html>
<html>
<head>
  <title>AI Chat Bot</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      height: 100vh;
    }

    .chat {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 15px;
      background: #111827;
      text-align: center;
    }

    .messages {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
    }

    .msg {
      padding: 10px;
      margin: 10px 0;
      border-radius: 10px;
    }

    .user {
      background: #2563eb;
      text-align: right;
    }

    .bot {
      background: #374151;
    }

    .input {
      display: flex;
      padding: 10px;
      background: #111827;
    }

    input {
      flex: 1;
      padding: 10px;
    }

    button {
      margin-left: 10px;
      padding: 10px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="chat">

  <div class="header">🤖 AI Chat Bot</div>

  <div class="messages" id="messages"></div>

  <div class="input">
    <input id="input" placeholder="Type message..." />
    <button onclick="send()">Send</button>
  </div>

</div>

<script>
function send() {
  let input = document.getElementById("input");
  let msg = input.value;
  if (!msg) return;

  add(msg, "user");

  setTimeout(() => {
    add("🤖 Demo reply: " + msg, "bot");
  }, 500);

  input.value = "";
}

function add(text, type) {
  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  document.getElementById("messages").appendChild(div);
}
</script>

</body>
</html>
