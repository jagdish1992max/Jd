<!DOCTYPE html>
<html>
<head>
  <title>Gemini AI Chat</title>
</head>

<body style="margin:0;font-family:Arial;background:#0f172a;color:white;">

<h2 style="text-align:center;padding:10px;">🤖 Gemini AI Chat</h2>

<div id="chat" style="height:80vh;overflow:auto;padding:10px;"></div>

<div style="display:flex;padding:10px;background:#111827;">
  <input id="input" style="flex:1;padding:10px;" placeholder="Ask anything..." />
  <button onclick="send()" style="padding:10px;">Send</button>
</div>

<script>
async function send() {
  let input = document.getElementById("input");
  let text = input.value;
  if (!text) return;

  add("👤 " + text);

  let res = await fetch("/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message: text })
  });

  let data = await res.json();

  add("🤖 " + data.reply);

  input.value = "";
}

function add(text) {
  let div = document.createElement("div");
  div.style.margin = "10px";
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
}
</script>

</body>
</html>
