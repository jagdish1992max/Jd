<script>
function send() {
  let input = document.getElementById("input");
  let msg = input.value.trim();
  if (!msg) return;

  add(msg, "user");

  setTimeout(() => {
    add(getReply(msg), "bot");
  }, 400);

  input.value = "";
}

function add(text, type) {
  let div = document.createElement("div");
  div.style.textAlign = type === "user" ? "right" : "left";
  div.style.margin = "10px";
  div.innerText = (type === "bot" ? "🤖 " : "👤 ") + text;

  document.body.appendChild(div);
}

// 🔥 SMART HINGLISH + BASIC AI STYLE RESPONSE
function getReply(msg) {
  let m = msg.toLowerCase();

  if (m.includes("kaise") || m.includes("kya") || m.includes("kyun")) {
    return "Main samajh gaya 👍 " + msg;
  }

  if (m.includes("hello") || m.includes("hi")) {
    return "Hello! 👋 kaise ho?";
  }

  return "🤖 Tumne kaha: " + msg;
}
</script>
