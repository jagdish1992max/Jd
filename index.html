<!DOCTYPE html>
<html>
<head>
  <title>AI Chat</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      height: 100vh;
    }

    .box {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
    }

    .chat {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
    }

    .msg {
      padding: 10px;
      margin: 8px;
      border-radius: 10px;
      max-width: 80%;
    }

    .user {
      background: #2563eb;
      margin-left: auto;
      text-align: right;
    }

    .bot {
      background: #374151;
    }

    .input {
      display: flex;
      padding: 10px;
      background: #111827;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 5px;
    }

    button {
      margin-left: 10px;
      padding: 10px;
      border: none;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box">

  <div class="chat" id="chat"></div>

  <div class="input">
    <input id="input" placeholder="Type message..." />
    <button onclick="send()">Send</button>
  </div>

</div>

<script>
function send() {
  let input = document.getElementById("input");
  let text = input.value.trim();
  if (!text) return;

  add(text, "user");

  setTimeout(() => {
    add(reply(text), "bot");
  }, 400);

  input.value = "";
}

function add(text, type) {
  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  document.getElementById("chat").appendChild(div);
}

function reply(text) {
  let t = text.toLowerCase();

  if (t.includes("hello") || t.includes("hi")) {
    return "👋 Hello! Kaise ho?";
  }

  if (t.includes("kya") || t.includes("kaise")) {
    return "🤖 Main samajh gaya: " + text;
  }

  return "🤖 You said: " + text;
}
</script>

</body>
</html>
